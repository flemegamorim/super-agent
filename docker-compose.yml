services:
  app:
    build: .
    container_name: super-agent
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-data:/app/.data
      - ./input:/app/input
      - ./output:/app/output
    expose:
      - "3000"
    # Uncomment to access the app directly without Nginx:
    # ports:
    #   - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: super-agent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  app-data:
