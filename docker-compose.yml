services:
  app:
    build: .
    container_name: super-agent
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-data:/app/web/.data
      - ./input:/app/input
      - ./output:/app/output
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: super-agent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - app

volumes:
  app-data:
