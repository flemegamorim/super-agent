services:
  app:
    build: .
    container_name: super-agent
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-data:/app/web/.data
      - ./input:/app/input
      - ./output:/app/output
    expose:
      - "3000"
    depends_on:
      minio-init:
        condition: service_completed_successfully

  nginx:
    image: nginx:alpine
    container_name: super-agent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - app

  minio:
    image: minio/minio
    container_name: super-agent-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} 2>/dev/null; do sleep 1; done;
      mc mb --ignore-existing local/$${S3_BUCKET};
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-super-agent}

volumes:
  app-data:
  minio-data:
