services:
  app:
    build: .
    container_name: super-agent
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-data:/app/web/.data
      - ./input:/app/input
      - ./output:/app/output
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: super-agent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    environment:
      - NGINX_HOST=${DOMAIN}
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: super-agent-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt

volumes:
  app-data:
  certbot-webroot:
  certbot-certs:
