name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  APP_DIR: /home/ec2-user/super-agent-node

jobs:
  # ──────────────────────────────────────────────
  # 1. Build check — fast fail before deploying
  # ──────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd web && npm ci

      - name: Build Next.js
        run: cd web && npm run build

  # ──────────────────────────────────────────────
  # 2. Deploy via SSM — no SSH needed
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy via SSM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify SSM connectivity
        run: |
          aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=${{ env.INSTANCE_ID }}" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text | grep -q "Online" \
            || (echo "ERROR: Instance not reachable via SSM" && exit 1)

      - name: Deploy application
        id: deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters commands='[
              "set -e",
              "cd ${{ env.APP_DIR }}",
              "git fetch origin",
              "git reset --hard origin/main",
              "docker compose build",
              "docker compose up -d --force-recreate",
              "docker compose ps",
              "echo DEPLOY_OK"
            ]' \
            --output text \
            --query "Command.CommandId")

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command: $COMMAND_ID"

      - name: Wait for deployment
        run: |
          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"
          echo "Waiting for command $COMMAND_ID ..."

          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ env.INSTANCE_ID }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")

            echo "  Attempt $i — status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo ""
              echo "=== Output ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query "StandardOutputContent" \
                --output text | tail -20
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo ""
              echo "=== Error Output ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query "StandardErrorContent" \
                --output text | tail -30
              exit 1
            fi
          done

          echo "ERROR: Timed out waiting for deployment"
          exit 1

  # ──────────────────────────────────────────────
  # 3. Smoke test — verify the app is responding
  # ──────────────────────────────────────────────
  verify:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          DOMAIN="${{ secrets.DOMAIN }}"
          URL="https://${DOMAIN}/login"
          echo "Waiting 15s for containers to stabilize..."
          sleep 15

          for i in $(seq 1 6); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "$URL" 2>/dev/null || echo "000")

            echo "  Attempt $i — HTTP $HTTP_CODE at $URL"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done

          echo "ERROR: App not responding after deploy"
          exit 1
